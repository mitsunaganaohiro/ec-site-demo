<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <header th:fragment="header">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" th:href="@{/}">EC Site</a>
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav ms-auto align-items-lg-center">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/products}">商品一覧</a>
                        </li>
                        <li class="nav-item" sec:authorize="isAnonymous()">
                            <a class="nav-link" th:href="@{/login}">ログイン</a>
                        </li>
                        <li class="nav-item" sec:authorize="isAnonymous()">
                            <a class="nav-link" th:href="@{/register}">会員登録</a>
                        </li>
                        <li class="nav-item" sec:authorize="hasRole('MEMBER')">
                            <a class="nav-link" th:href="@{/cart}">カート</a>
                        </li>
                        <li class="nav-item" sec:authorize="hasRole('MEMBER')">
                            <a class="nav-link" th:href="@{/orders}">注文履歴</a>
                        </li>
                        <li class="nav-item" sec:authorize="hasRole('MEMBER')">
                            <span class="nav-link" sec:authentication="principal.name"></span>
                        </li>
                        <li class="nav-item" sec:authorize="hasRole('MEMBER')">
                            <form th:action="@{/logout}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-link nav-link p-0 border-0">ログアウト</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
</body>
</html>
