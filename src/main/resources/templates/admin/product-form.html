<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${productId != null ? '商品編集' : '商品登録'}"></title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <main class="container py-5" style="max-width: 480px;">
        <h1 class="mb-4" th:text="${productId != null ? '商品編集' : '商品登録'}"></h1>

        <form th:action="${productId != null ? '/admin/products/' + productId : '/admin/products'}"
              th:object="${productForm}" method="post">
            <input type="hidden" name="_method" value="PUT" th:if="${productId != null}">

            <div class="mb-3">
                <label for="name" class="form-label">商品名</label>
                <input type="text" id="name" th:field="*{name}" class="form-control">
                <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></div>
            </div>

            <div class="mb-3">
                <label for="price" class="form-label">価格</label>
                <input type="number" id="price" th:field="*{price}" class="form-control" min="0">
                <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="text-danger"></div>
            </div>

            <div class="mb-3">
                <label for="categoryId" class="form-label">カテゴリ</label>
                <select id="categoryId" th:field="*{categoryId}" class="form-select">
                    <option th:each="category : ${categories}"
                            th:value="${category.categoryId}"
                            th:text="${category.name}"
                            th:selected="${productForm.categoryId != null and productForm.categoryId == category.categoryId}">
                    </option>
                </select>
                <div th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}" class="text-danger"></div>
            </div>

            <div class="mb-3">
                <label for="stockQuantity" class="form-label">在庫数</label>
                <input type="number" id="stockQuantity" th:field="*{stockQuantity}" class="form-control" min="0">
                <div th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}" class="text-danger"></div>
            </div>

            <button type="submit" class="btn btn-primary w-100"
                    th:text="${productId != null ? '更新' : '登録'}"></button>
        </form>

        <p class="mt-3"><a th:href="@{/admin/products}">一覧へ戻る</a></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
