<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>注文詳細(管理者)</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <main class="container py-5" style="max-width: 700px;">
        <h1 class="mb-4">注文詳細</h1>

        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <dl class="row">
            <dt class="col-sm-4">注文ID</dt>
            <dd class="col-sm-8" th:text="${order.orderId}"></dd>

            <dt class="col-sm-4">会員名</dt>
            <dd class="col-sm-8" th:text="${order.memberName}"></dd>

            <dt class="col-sm-4">注文日時</dt>
            <dd class="col-sm-8" th:text="${#temporals.format(order.createdAt, 'yyyy/MM/dd HH:mm')}"></dd>

            <dt class="col-sm-4">合計金額</dt>
            <dd class="col-sm-8" th:text="'¥' + ${#numbers.formatInteger(order.totalAmount, 1, 'COMMA')}"></dd>

            <dt class="col-sm-4">ステータス</dt>
            <dd class="col-sm-8" th:switch="${order.status}">
                <span th:case="'1'" class="badge bg-info">注文受付</span>
                <span th:case="'2'" class="badge bg-warning">発送準備</span>
                <span th:case="'3'" class="badge bg-success">発送完了</span>
                <span th:case="'4'" class="badge bg-secondary">キャンセル</span>
            </dd>
        </dl>

        <table class="table align-middle">
            <thead>
                <tr>
                    <th>商品名</th>
                    <th>単価</th>
                    <th>数量</th>
                    <th>小計</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="orderItem : ${orderItems}">
                    <td th:text="${orderItem.productName}"></td>
                    <td th:text="'¥' + ${#numbers.formatInteger(orderItem.unitPrice, 1, 'COMMA')}"></td>
                    <td th:text="${orderItem.quantity}"></td>
                    <td th:text="'¥' + ${#numbers.formatInteger(orderItem.subtotal, 1, 'COMMA')}"></td>
                </tr>
            </tbody>
        </table>

        <form th:if="${canCancel}" th:action="@{/admin/orders/{id}/cancel(id=${order.orderId})}" method="post"
              onsubmit="return confirm('本当にキャンセルしますか？');">
            <button type="submit" class="btn btn-danger">注文をキャンセルする</button>
        </form>

        <p class="mt-3"><a th:href="@{/admin/orders}">注文一覧へ戻る</a></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
