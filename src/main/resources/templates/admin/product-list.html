<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商品一覧(管理者)</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <main class="container py-5">
        <h1 class="mb-4">商品一覧</h1>

        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <a th:href="@{/admin/products/new}" class="btn btn-primary mb-3">新規登録</a>

        <table class="table align-middle">
            <thead>
                <tr>
                    <th>商品名</th>
                    <th>価格</th>
                    <th>カテゴリ</th>
                    <th>在庫数</th>
                    <th>削除状態</th>
                    <th></th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}"
                    th:class="${product.deletedAt != null ? 'text-muted' : ''}">
                    <td th:class="${product.deletedAt != null ? 'text-decoration-line-through' : ''}"
                        th:text="${product.name}"></td>
                    <td th:text="'¥' + ${#numbers.formatInteger(product.price, 1, 'COMMA')}"></td>
                    <td th:text="${product.categoryName}"></td>
                    <td th:text="${product.stockQuantity}"></td>
                    <td th:text="${product.deletedAt != null ? '削除済み' : '販売中'}"></td>
                    <td>
                        <a th:href="@{/admin/products/{id}/edit(id=${product.productId})}"
                           class="btn btn-outline-primary btn-sm"
                           th:classappend="${product.deletedAt != null ? ' disabled' : ''}">
                            編集
                        </a>
                    </td>
                    <td>
                        <form th:action="@{/admin/products/{id}/delete(id=${product.productId})}"
                              method="post" th:unless="${product.deletedAt != null}">
                            <button type="submit" class="btn btn-outline-danger btn-sm"
                                    onclick="return confirm('削除しますか？')">
                                削除
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
