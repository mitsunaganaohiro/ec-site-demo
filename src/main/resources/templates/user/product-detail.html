<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${product.name}">商品詳細</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <header th:replace="~{fragments/header :: header}"></header>

    <main class="container py-5" style="max-width: 600px;">
        <h1 class="mb-3" th:text="${product.name}"></h1>
        <p class="text-muted" th:text="${product.categoryName}"></p>
        <p class="fs-4 fw-bold" th:text="'¥' + ${#numbers.formatInteger(product.price, 1, 'COMMA')}"></p>

        <p th:if="${product.stockQuantity == 0}" class="text-danger fw-bold">在庫切れ</p>
        <p th:unless="${product.stockQuantity == 0}">
            在庫数: <span th:text="${product.stockQuantity}"></span>
        </p>

        <form th:action="@{/cart/items}" method="post" class="mb-3">
            <input type="hidden" name="productId" th:value="${product.productId}">
            <div class="mb-3" style="max-width: 160px;">
                <label for="quantity" class="form-label">数量</label>
                <input type="number" id="quantity" name="quantity" value="1" min="1" class="form-control">
            </div>
            <!-- Day 12でカート機能を有効化するまでは非活性 -->
            <button type="submit" class="btn btn-primary" disabled>カートに追加</button>
        </form>

        <p><a th:href="@{/products}">商品一覧へ戻る</a></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
