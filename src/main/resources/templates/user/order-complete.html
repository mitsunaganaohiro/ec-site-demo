<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>注文完了</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <header th:replace="~{fragments/header :: header}"></header>

    <main class="container py-5" style="max-width: 600px;">
        <h1 class="mb-4">ご注文ありがとうございました</h1>

        <dl class="row">
            <dt class="col-sm-4">注文番号</dt>
            <dd class="col-sm-8" th:text="${order.orderId}"></dd>

            <dt class="col-sm-4">合計金額</dt>
            <dd class="col-sm-8" th:text="'¥' + ${#numbers.formatInteger(order.totalAmount, 1, 'COMMA')}"></dd>

            <dt class="col-sm-4">注文日時</dt>
            <dd class="col-sm-8" th:text="${#temporals.format(order.createdAt, 'yyyy/MM/dd HH:mm')}"></dd>
        </dl>

        <div class="d-flex gap-2">
            <a th:href="@{/orders}" class="btn btn-outline-secondary">注文履歴を見る</a>
            <a th:href="@{/products}" class="btn btn-primary">商品一覧へ戻る</a>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
