<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>注文確認</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <header th:replace="~{fragments/header :: header}"></header>

    <main class="container py-5">
        <h1 class="mb-4">注文確認</h1>

        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <table class="table align-middle">
            <thead>
                <tr>
                    <th>商品名</th>
                    <th>単価</th>
                    <th>数量</th>
                    <th>小計</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cartItems}">
                    <td th:text="${item.productName}"></td>
                    <td th:text="'¥' + ${#numbers.formatInteger(item.price, 1, 'COMMA')}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="'¥' + ${#numbers.formatInteger(item.subTotal, 1, 'COMMA')}"></td>
                </tr>
            </tbody>
        </table>

        <p class="fs-4 fw-bold text-end">
            合計金額: <span th:text="'¥' + ${#numbers.formatInteger(totalAmount, 1, 'COMMA')}"></span>
        </p>

        <p class="mb-4">
            決済方法: <strong>モック決済（常に成功）</strong>
        </p>

        <form th:action="@{/orders}" method="post" class="d-flex justify-content-end gap-2">
            <a th:href="@{/cart}" class="btn btn-outline-secondary">カートへ戻る</a>
            <button type="submit" class="btn btn-primary">注文を確定する</button>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
