<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>注文履歴</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <header th:replace="~{fragments/header :: header}"></header>

    <main class="container py-5">
        <h1 class="mb-4">注文履歴</h1>

        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <div th:if="${#lists.isEmpty(orders)}">
            <p class="text-muted">注文履歴はありません</p>
            <a th:href="@{/products}" class="btn btn-primary">商品一覧へ戻る</a>
        </div>

        <table class="table align-middle" th:unless="${#lists.isEmpty(orders)}">
            <thead>
                <tr>
                    <th>注文ID</th>
                    <th>注文日</th>
                    <th>合計金額</th>
                    <th>ステータス</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.orderId}"></td>
                    <td th:text="${#temporals.format(order.orderDate, 'yyyy/MM/dd')}"></td>
                    <td th:text="'¥' + ${#numbers.formatInteger(order.totalAmount, 1, 'COMMA')}"></td>
                    <td th:switch="${order.status}">
                        <span th:case="'1'" class="badge bg-info">注文受付</span>
                        <span th:case="'2'" class="badge bg-warning">発送準備</span>
                        <span th:case="'3'" class="badge bg-success">発送完了</span>
                        <span th:case="'4'" class="badge bg-secondary">キャンセル</span>
                    </td>
                    <td>
                        <a th:href="@{/orders/{id}(id=${order.orderId})}" class="btn btn-outline-primary btn-sm">
                            詳細を見る
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
