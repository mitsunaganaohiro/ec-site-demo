<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商品一覧</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <header th:replace="~{fragments/header :: header}"></header>

    <main class="container py-5">
        <h1 class="mb-4">商品一覧</h1>

        <form th:action="@{/products}" method="get" class="row g-2 mb-4">
            <div class="col-auto">
                <select name="categoryId" class="form-select">
                    <option value="" th:selected="${selectedCategoryId == null}">すべてのカテゴリ</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.categoryId}"
                            th:text="${category.name}"
                            th:selected="${selectedCategoryId != null and selectedCategoryId == category.categoryId}">
                    </option>
                </select>
            </div>
            <div class="col-auto">
                <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="キーワード検索">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary">検索</button>
            </div>
        </form>

        <p th:if="${#lists.isEmpty(products)}" class="text-muted">該当する商品が見つかりませんでした</p>

        <div class="row" th:unless="${#lists.isEmpty(products)}">
            <div class="col-md-4 mb-4" th:each="product : ${products}">
                <div class="card h-100">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${product.name}"></h5>
                        <p class="card-text text-muted mb-1" th:text="${product.categoryName}"></p>
                        <p class="card-text fw-bold" th:text="'¥' + ${#numbers.formatInteger(product.price, 1, 'COMMA')}"></p>
                        <span th:if="${product.stockQuantity == 0}" class="badge bg-secondary mb-2 align-self-start">在庫切れ</span>
                        <a th:href="@{/products/{id}(id=${product.productId})}" class="btn btn-outline-primary btn-sm mt-auto">
                            詳細を見る
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
